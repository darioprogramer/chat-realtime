<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chat">
    <h2>DFL - Chat Online</h2>
    <label class="Label1">Usuarios conectados:</label>
    <select id="userSelect"></select>
    <div id="messages"></div>
    <div id="form">
      <textarea id="input" placeholder="Escribe un mensaje..."></textarea>
      <button id="send">Enviar</button>
      <button id="record">🎤</button>
      <input type="file" id="imageInput" accept="image/*"> <!-- botón para enviar imágenes -->
    </div>
  </div>
  <!-- Cliente de Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
