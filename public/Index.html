<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Web</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos mínimos para que se vea bien al probar */
    body { font-family: Arial, sans-serif; background:#222; color:#fff; margin:0; padding:20px; }
    #chat { max-width:800px; margin:0 auto; background:#2b2b2b; padding:16px; border-radius:8px; }
    #messages { height:360px; overflow:auto; background:#1f1f1f; padding:12px; border-radius:6px; margin:12px 0; }
    .msg { margin-bottom:10px; padding:6px; border-radius:6px; }
    .mine { background:#0b6; color:#000; }
    .other { background:#444; }
    .username { font-weight:700; display:block; margin-bottom:4px; }
    .chat-image { max-width:240px; display:block; margin-top:6px; border-radius:6px; }
    #form { display:flex; gap:8px; align-items:center; }
    textarea#input { flex:1; height:56px; resize:none; padding:8px; border-radius:6px; border:1px solid #444; background:#111; color:#fff; }
    button, label#imageButton { background:#3a3a3a; border:none; padding:8px 10px; border-radius:6px; cursor:pointer; }
    select#userSelect { background:#111; color:#fff; border:1px solid #444; padding:6px; border-radius:6px; }
  </style>
</head>
<body>
  <div id="chat">
    <h2>DFL - Chat Online</h2>
    <label class="Label1">Usuarios conectados:</label>
    <select id="userSelect"></select>

    <div id="messages" aria-live="polite"></div>

    <div id="form">
      <textarea id="input" placeholder="Escribe un mensaje..."></textarea>

      <button id="send" title="Enviar" aria-label="Enviar">
        Enviar
      </button>

      <button id="record" title="Grabar" aria-label="Grabar">
        🎤
      </button>

      <label for="imageInput" id="imageButton" title="Enviar imagen" style="display:inline-block; cursor:pointer;">
        📷
      </label>
      <input type="file" id="imageInput" accept="image/*" hidden>
    </div>
  </div>

  <!-- Cliente de Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
